<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>macaronV2 Ops Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    :root {
      --bg: #071018;
      --bg-2: #0c1924;
      --panel: #0f2130;
      --panel-2: #12283a;
      --line: #1f3a51;
      --ink: #e9f1fa;
      --muted: #8faac2;
      --accent: #4dfbc6;
      --accent-2: #59b7ff;
      --critical: #ff6f8f;
      --warning: #ffcc66;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Sora", system-ui, sans-serif;
      background:
        radial-gradient(circle at 0% 0%, #113552 0, transparent 28%),
        radial-gradient(circle at 100% 5%, #1f254d 0, transparent 26%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      min-height: 100vh;
    }
    .shell {
      max-width: 1580px;
      margin: 0 auto;
      padding: 14px;
      display: grid;
      gap: 12px;
      grid-template-columns: 330px 1fr;
    }
    .topbar {
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      background: linear-gradient(120deg, #102334, #0b1927);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .title {
      margin: 0;
      font-size: 24px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .tagline { color: var(--muted); font-size: 13px; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 11px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      color: var(--accent);
      background: #0a1723;
    }
    .pill.warn { color: var(--warning); }
    .pill-grid { display: flex; gap: 8px; align-items: center; }
    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }
    .left { padding: 12px; display: flex; flex-direction: column; max-height: calc(100vh - 110px); }
    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0a1824;
      color: var(--ink);
      padding: 10px;
      font-family: "IBM Plex Mono", monospace;
      margin-bottom: 10px;
    }
    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .chip {
      border: 1px solid var(--line);
      background: #0b1723;
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      font-family: "IBM Plex Mono", monospace;
      cursor: pointer;
      transition: all .15s ease;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { border-color: var(--accent); color: var(--accent); background: #0f2333; }
    .scan-list { overflow: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 3px; }
    .scan {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #0a1722;
      cursor: pointer;
      transition: all .15s ease;
    }
    .scan:hover { border-color: var(--accent); transform: translateY(-1px); }
    .scan.active { border-color: var(--accent); background: #0f2232; }
    .scan .name { font-weight: 700; margin-bottom: 4px; }
    .scan .meta { color: var(--muted); font-size: 12px; }

    .right { padding: 12px; display: grid; gap: 12px; }
    .summary { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 9px; }
    .metric {
      border: 1px solid var(--line);
      border-radius: 11px;
      background: #0b1a27;
      padding: 10px;
    }
    .metric .k { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .metric .v { font-size: 23px; font-weight: 700; margin-top: 4px; color: var(--accent); }

    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 10px;
      background: #0b1723;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    .tab.active { border-color: var(--accent); color: var(--accent); }

    .view { display: none; }
    .view.active { display: block; }

    .split { display: grid; grid-template-columns: 1.1fr 1fr; gap: 12px; }
    .box {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0b1a27;
      padding: 12px;
    }
    .box h3 {
      margin: 0 0 8px;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #9fc6e4;
    }
    #map { height: 350px; border: 1px solid #1b3247; border-radius: 10px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
    }
    th, td { border-bottom: 1px dashed #1b3349; padding: 6px 0; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
    td a { color: var(--accent-2); text-decoration: none; }
    .sev-critical, .sev-high { color: var(--critical); }
    .sev-medium { color: var(--warning); }

    .timeline { display: flex; flex-direction: column; gap: 8px; }
    .stage {
      display: grid;
      grid-template-columns: 140px 1fr auto;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
    }
    .bar {
      height: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: #09131d;
    }
    .fill { height: 100%; background: linear-gradient(90deg, #49f5bf, #4da2ff); }

    .muted { color: var(--muted); }
    .mono { font-family: "IBM Plex Mono", monospace; }
    .status-strip {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0a1621;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .badge {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0b1825;
      padding: 8px;
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
      color: var(--muted);
    }
    .badge b { color: var(--ink); }
    .trend {
      display: grid;
      gap: 8px;
    }
    .trend-item {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
    }
    .spark {
      height: 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #07121b;
      overflow: hidden;
    }
    .spark-fill {
      height: 100%;
      background: linear-gradient(90deg, #59b7ff, #4dfbc6);
      transform-origin: left;
      animation: grow .45s ease;
    }
    @keyframes grow {
      from { transform: scaleX(.1); opacity: .5; }
      to { transform: scaleX(1); opacity: 1; }
    }
    .fade-in {
      animation: fade .25s ease;
    }
    @keyframes fade {
      from { opacity: 0; transform: translateY(2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 10px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      color: var(--ink);
      background: #0c1a27;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .launch {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0a1621;
      padding: 10px;
      margin-bottom: 10px;
      display: grid;
      gap: 8px;
    }
    .launch label {
      font-size: 11px;
      letter-spacing: .05em;
      color: var(--muted);
      text-transform: uppercase;
      font-family: "IBM Plex Mono", monospace;
    }
    .launch input, .launch select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b1723;
      color: var(--ink);
      padding: 8px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
    }
    .launch .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .live-box {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0a1621;
      padding: 10px;
    }
    .live-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
      color: var(--muted);
    }
    .live-log {
      max-height: 220px;
      overflow: auto;
      border: 1px solid #1d3246;
      border-radius: 10px;
      background: #07111a;
      padding: 8px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      color: #b5cde4;
      white-space: pre-wrap;
    }

    @media (max-width: 1260px) {
      .shell { grid-template-columns: 1fr; }
      .left { max-height: 300px; }
      .summary { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .split { grid-template-columns: 1fr; }
      .status-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="topbar">
      <div>
        <h1 class="title">macaronV2 OPS Console</h1>
        <div class="tagline">Intent-first recon: setup -> scan -> inspect -> export</div>
      </div>
      <div class="pill-grid">
        <div class="pill mono" id="pulse">loading scans...</div>
        <div class="pill mono warn" id="lastRefresh">refreshing...</div>
      </div>
    </section>

    <aside class="panel left">
      <div class="launch">
        <label>Run Scan From UI</label>
        <input id="scanTarget" placeholder="target (example: google.com)" />
        <div class="row">
          <select id="scanMode">
            <option value="wide">wide</option>
            <option value="fast">fast</option>
            <option value="narrow">narrow</option>
            <option value="deep">deep</option>
            <option value="osint">osint</option>
          </select>
          <input id="scanStages" value="all" placeholder="stages" />
        </div>
        <div class="row">
          <input id="scanRate" type="number" value="150" min="1" />
          <input id="scanThreads" type="number" value="30" min="1" />
        </div>
        <button class="btn" id="startScan">start scan</button>
      </div>
      <input id="search" class="search" placeholder="search target / mode / id" />
      <div class="filters" id="filters">
        <button class="chip active" data-mode="all">all</button>
        <button class="chip" data-mode="wide">wide</button>
        <button class="chip" data-mode="fast">fast</button>
        <button class="chip" data-mode="narrow">narrow</button>
        <button class="chip" data-mode="deep">deep</button>
        <button class="chip" data-mode="osint">osint</button>
      </div>
      <div id="scanList" class="scan-list"></div>
    </aside>

    <main class="panel right">
      <section class="live-box">
        <div class="live-head">
          <span id="liveState">live job: idle</span>
          <span id="liveUpdated">no updates yet</span>
        </div>
        <pre class="live-log" id="liveLog">No live scan selected. Start one from the left panel.</pre>
      </section>
      <section id="detail">
        <div class="muted">Select a scan from the left panel.</div>
      </section>
    </main>
  </div>

  <script>
    let scans = [];
    let activeId = null;
    let map = null;
    let mapMarkers = [];
    const refreshMS = 15000;
    const liveRefreshMS = 1200;
    let modeFilter = 'all';
    let filteredScans = [];
    let liveJobs = [];
    let activeLiveId = '';

    function fmtDate(raw) {
      if (!raw) return '-';
      return new Date(raw).toLocaleString();
    }

    function stageData(stats) {
      const values = [
        { name: 'subdomains', v: stats.subdomains || 0 },
        { name: 'http/live', v: stats.live_hosts || 0 },
        { name: 'ports', v: stats.ports || 0 },
        { name: 'urls', v: stats.urls || 0 },
        { name: 'js', v: stats.js_files || 0 },
        { name: 'vulns', v: stats.vulns || 0 },
      ];
      const max = Math.max(...values.map(x => x.v), 1);
      return values.map(s => ({ ...s, pct: Math.max(3, Math.round((s.v / max) * 100)) }));
    }

    function drawMap(points) {
      if (!map) {
        map = L.map('map', { worldCopyJump: true }).setView([18, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
      }
      mapMarkers.forEach(m => map.removeLayer(m));
      mapMarkers = [];
      (points || []).forEach(p => {
        const radius = Math.max(6, Math.min(24, p.count * 2));
        const marker = L.circleMarker([p.lat, p.lon], {
          radius,
          color: '#4dfbc6',
          fillColor: '#4dfbc6',
          fillOpacity: 0.28,
          weight: 2,
        }).addTo(map);
        marker.bindPopup(`<b>${p.country || 'Unknown'}</b><br>${p.city || ''}<br>hits: ${p.count}`);
        mapMarkers.push(marker);
      });
    }

    function scanCard(s) {
      return `
        <div class="scan fade-in ${s.id === activeId ? 'active' : ''}" data-id="${s.id}">
          <div class="name">${s.target}</div>
          <div class="meta">${s.mode} | live ${s.stats.live_hosts} | urls ${s.stats.urls}</div>
          <div class="meta">${fmtDate(s.finished_at)}</div>
        </div>
      `;
    }

    function renderScanList(items) {
      const root = document.getElementById('scanList');
      if (!items.length) {
        root.innerHTML = `<div class="muted mono">No scans match current filters.</div>`;
        return;
      }
      root.innerHTML = items.map(scanCard).join('');
      root.querySelectorAll('.scan').forEach(node => {
        node.addEventListener('click', () => {
          activeId = node.getAttribute('data-id');
          renderScanList(items);
          loadResult(activeId);
        });
      });
      if (!activeId && items[0]) {
        activeId = items[0].id;
        renderScanList(items);
        loadResult(activeId);
      }
    }

    function renderLive(job) {
      const stateNode = document.getElementById('liveState');
      const updatedNode = document.getElementById('liveUpdated');
      const logNode = document.getElementById('liveLog');
      if (!job) {
        stateNode.textContent = 'live job: idle';
        updatedNode.textContent = 'no updates yet';
        logNode.textContent = 'No live scan selected. Start one from the left panel.';
        return;
      }
      stateNode.textContent = `live job: ${job.target} (${job.status})`;
      updatedNode.textContent = `updated ${fmtDate(job.updated_at)}`;
      logNode.textContent = (job.log || []).join('\n');
      logNode.scrollTop = logNode.scrollHeight;
      if (job.status === 'done' && job.result && job.result.id) {
        activeId = job.result.id;
      }
    }

    async function loadLive() {
      try {
        const res = await fetch('/api/live');
        if (!res.ok) return;
        liveJobs = await res.json();
        const running = liveJobs.find(j => j.status === 'running') || liveJobs[0];
        if (!activeLiveId && running) activeLiveId = running.job_id;
        if (activeLiveId) {
          const detail = await fetch('/api/live?id=' + encodeURIComponent(activeLiveId));
          if (detail.ok) {
            const job = await detail.json();
            renderLive(job);
            if (job.status === 'done' && job.result && job.result.id) {
              await loadScans();
              await loadResult(job.result.id);
            }
            return;
          }
        }
        renderLive(null);
      } catch (_) {}
    }

    async function startScan() {
      const payload = {
        target: document.getElementById('scanTarget').value.trim(),
        mode: document.getElementById('scanMode').value.trim(),
        stages: document.getElementById('scanStages').value.trim() || 'all',
        rate: Number(document.getElementById('scanRate').value || 150),
        threads: Number(document.getElementById('scanThreads').value || 30),
      };
      if (!payload.target) {
        alert('Target is required');
        return;
      }
      const res = await fetch('/api/scan/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const txt = await res.text();
        alert('Scan start failed: ' + txt);
        return;
      }
      const data = await res.json();
      activeLiveId = data.job_id;
      document.getElementById('scanTarget').value = '';
      await loadLive();
    }

    async function loadHeat() {
      try {
        const res = await fetch('/api/heat');
        if (!res.ok) return;
        const points = await res.json();
        drawMap(points);
      } catch (_) {}
    }

    function hostTable(rows) {
      if (!rows || !rows.length) return '<div class="muted">No live hosts</div>';
      return `
        <table>
          <thead><tr><th>status</th><th>url</th><th>title</th></tr></thead>
          <tbody>
            ${rows.slice(0, 180).map(r => `<tr><td>${r.status_code}</td><td><a href="${r.url}" target="_blank">${r.url}</a></td><td>${(r.title || '').replace(/</g,'&lt;')}</td></tr>`).join('')}
          </tbody>
        </table>`;
    }

    function vulnTable(rows) {
      if (!rows || !rows.length) return '<div class="muted">No vulnerability results</div>';
      return `
        <table>
          <thead><tr><th>severity</th><th>template</th><th>matched</th></tr></thead>
          <tbody>
            ${rows.slice(0, 180).map(v => `<tr><td class="sev-${v.severity}">${v.severity}</td><td>${v.template || ''}</td><td>${v.matched || ''}</td></tr>`).join('')}
          </tbody>
        </table>`;
    }

    function textList(rows, empty) {
      if (!rows || !rows.length) return `<div class="muted">${empty}</div>`;
      return `<table><tbody>${rows.slice(0, 220).map(x => `<tr><td>${String(x).replace(/</g,'&lt;')}</td></tr>`).join('')}</tbody></table>`;
    }

    function trendRows(currentId) {
      const recent = scans.slice(0, 12);
      const max = Math.max(...recent.map(s => s.stats.urls || 0), 1);
      return recent.map(s => {
        const width = Math.max(4, Math.round(((s.stats.urls || 0) / max) * 100));
        const marker = s.id === currentId ? ' <b>(selected)</b>' : '';
        return `<div class="trend-item"><span>${s.target}</span><span class="spark"><span class="spark-fill" style="width:${width}%"></span></span><span>${s.stats.urls || 0}${marker}</span></div>`;
      }).join('');
    }

    function renderDetail(r) {
      const s = r.stats || {};
      const stages = stageData(s);
      const detail = document.getElementById('detail');
      detail.innerHTML = `
        <div class="status-strip mono">
          <span>viewing: ${r.target} (${r.id})</span>
          <button class="btn" id="refreshNow">refresh now</button>
        </div>
        <div class="status-grid">
          <div class="badge">Last Finished: <b>${fmtDate(r.finished_at)}</b></div>
          <div class="badge">Duration: <b>${r.duration_ms || 0}ms</b></div>
          <div class="badge">Health: <b>${(r.warnings || []).length ? 'warnings present' : 'clean run'}</b></div>
        </div>
        <div class="mono muted">scan ${r.id} | target ${r.target} | mode ${r.mode} | finished ${fmtDate(r.finished_at)} | duration ${r.duration_ms}ms</div>

        <div class="summary">
          <div class="metric"><div class="k">subdomains</div><div class="v">${s.subdomains || 0}</div></div>
          <div class="metric"><div class="k">live hosts</div><div class="v">${s.live_hosts || 0}</div></div>
          <div class="metric"><div class="k">ports</div><div class="v">${s.ports || 0}</div></div>
          <div class="metric"><div class="k">urls</div><div class="v">${s.urls || 0}</div></div>
          <div class="metric"><div class="k">js files</div><div class="v">${s.js_files || 0}</div></div>
          <div class="metric"><div class="k">vulns</div><div class="v">${s.vulns || 0}</div></div>
        </div>

        <div class="tabs" id="tabs">
          <button class="tab active" data-tab="overview">overview</button>
          <button class="tab" data-tab="assets">assets</button>
          <button class="tab" data-tab="findings">findings</button>
          <button class="tab" data-tab="raw">raw</button>
        </div>

        <section id="tab-overview" class="view active">
          <div class="split">
            <div class="box">
              <h3>Global Traffic Footprint</h3>
              <div id="map"></div>
            </div>
            <div class="box">
              <h3>Stage Yield</h3>
              <div class="timeline">
                ${stages.map(x => `<div class="stage"><span>${x.name}</span><span class="bar"><span class="fill" style="width:${x.pct}%"></span></span><span>${x.v}</span></div>`).join('')}
              </div>
            </div>
            <div class="box">
              <h3>Recent URL Yield Trend</h3>
              <div class="trend">
                ${trendRows(r.id)}
              </div>
            </div>
          </div>
        </section>

        <section id="tab-assets" class="view">
          <div class="split">
            <div class="box"><h3>Live Hosts</h3>${hostTable(r.live_hosts)}</div>
            <div class="box"><h3>Subdomains</h3>${textList(r.subdomains, 'No subdomains')}</div>
            <div class="box"><h3>URLs</h3>${textList(r.urls, 'No URLs')}</div>
            <div class="box"><h3>JavaScript Files</h3>${textList(r.js_files, 'No JavaScript files')}</div>
          </div>
        </section>

        <section id="tab-findings" class="view">
          <div class="split">
            <div class="box"><h3>Vulnerabilities</h3>${vulnTable(r.vulns)}</div>
            <div class="box"><h3>Warnings</h3>${textList(r.warnings || [], 'No warnings')}</div>
          </div>
        </section>

        <section id="tab-raw" class="view">
          <div class="box">
            <h3>Raw JSON</h3>
            <pre class="mono" style="white-space:pre-wrap;font-size:12px;color:#cbe0f2;max-height:520px;overflow:auto">${JSON.stringify(r, null, 2).replace(/</g,'&lt;')}</pre>
          </div>
        </section>
      `;

      detail.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          detail.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          detail.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
          btn.classList.add('active');
          detail.querySelector('#tab-' + btn.dataset.tab).classList.add('active');
          if (btn.dataset.tab === 'overview') loadHeat();
        });
      });
      const refreshBtn = document.getElementById('refreshNow');
      if (refreshBtn) {
        refreshBtn.addEventListener('click', async () => {
          await loadScans();
          if (activeId) await loadResult(activeId);
        });
      }

      loadHeat();
    }

    async function loadResult(id) {
      const res = await fetch('/api/results?id=' + encodeURIComponent(id));
      if (!res.ok) return;
      const data = await res.json();
      renderDetail(data);
    }

    async function loadScans() {
      const res = await fetch('/api/scans');
      if (!res.ok) {
        document.getElementById('pulse').textContent = 'scan index unavailable';
        return;
      }
      scans = await res.json();
      document.getElementById('pulse').textContent = `${scans.length} indexed scans`;
      document.getElementById('lastRefresh').textContent = `updated ${new Date().toLocaleTimeString()}`;
      applyFilters();
      renderScanList(filteredScans);
    }

    function applyFilters() {
      const q = (document.getElementById('search').value || '').toLowerCase().trim();
      filteredScans = scans.filter(s => {
        if (modeFilter !== 'all' && String(s.mode).toLowerCase() !== modeFilter) return false;
        if (!q) return true;
        return (`${s.id} ${s.target} ${s.mode}`).toLowerCase().includes(q);
      });
    }

    document.getElementById('search').addEventListener('input', () => {
      applyFilters();
      renderScanList(filteredScans);
    });
    document.getElementById('startScan').addEventListener('click', startScan);

    document.getElementById('filters').querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('filters').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        modeFilter = btn.getAttribute('data-mode') || 'all';
        applyFilters();
        renderScanList(filteredScans);
      });
    });

    loadScans();
    loadLive();
    setInterval(async () => {
      await loadScans();
      if (activeId) await loadResult(activeId);
    }, refreshMS);
    setInterval(loadLive, liveRefreshMS);
  </script>
</body>
</html>
