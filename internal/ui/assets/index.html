<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>macaronV2 Threat Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    :root {
      --bg: #060b10;
      --panel: #0e1720;
      --panel-2: #131f2a;
      --ink: #e4ecf5;
      --muted: #8aa0b5;
      --line: #233445;
      --accent: #2df8b0;
      --danger: #ff617e;
      --warn: #ffc857;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% -10%, #15354b 0, transparent 32%),
        radial-gradient(circle at 90% 0%, #1d203d 0, transparent 28%),
        linear-gradient(180deg, #05090e 0%, #070d14 100%);
      font-family: "Space Grotesk", system-ui, sans-serif;
      min-height: 100vh;
    }
    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 14px;
      max-width: 1460px;
      margin: 0 auto;
      padding: 16px;
    }
    .panel {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .header { padding: 16px 18px; margin-bottom: 14px; }
    .title { margin: 0; font-size: 28px; letter-spacing: .04em; text-transform: uppercase; }
    .subtitle { color: var(--muted); margin-top: 6px; }
    .left { padding: 12px; height: calc(100vh - 32px); overflow: hidden; display: flex; flex-direction: column; }
    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #09131d;
      color: var(--ink);
      padding: 10px 12px;
      outline: none;
      margin-bottom: 12px;
      font-family: "JetBrains Mono", monospace;
    }
    .scan-list { overflow: auto; display: flex; flex-direction: column; gap: 8px; }
    .scan {
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 10px;
      background: #08111a;
      cursor: pointer;
      transition: all .18s ease;
    }
    .scan:hover { border-color: var(--accent); transform: translateY(-1px); }
    .scan.active { border-color: var(--accent); background: #0c1722; }
    .scan b { display: block; margin-bottom: 4px; }
    .scan .m { color: var(--muted); font-size: 12px; }
    .right { padding: 14px; }
    .stats { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 10px; }
    .stat { background: #0a141f; border: 1px solid var(--line); border-radius: 11px; padding: 10px; }
    .stat .k { color: var(--muted); font-size: 12px; }
    .stat .v { font-weight: 700; font-size: 24px; margin-top: 4px; color: var(--accent); }
    .split { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; margin-top: 12px; }
    .box { background: #0a141f; border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
    .box h3 { margin: 0 0 8px; font-size: 13px; color: #9fc2dc; letter-spacing: .08em; text-transform: uppercase; }
    #map { height: 360px; border-radius: 10px; border: 1px solid #1b2b3d; }
    ul { margin: 0; padding: 0; list-style: none; max-height: 360px; overflow: auto; }
    li { font-family: "JetBrains Mono", monospace; font-size: 12px; border-bottom: 1px dashed #1d2d3c; padding: 6px 0; }
    .sev-critical, .sev-high { color: var(--danger); }
    .sev-medium { color: var(--warn); }
    .footer { color: var(--muted); margin-top: 10px; font-size: 12px; }
    @media (max-width: 1180px) {
      .grid { grid-template-columns: 1fr; }
      .left { height: auto; max-height: 340px; }
      .stats { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="grid">
    <aside class="panel left">
      <input id="search" class="search" placeholder="filter target..." />
      <div id="scanList" class="scan-list"></div>
    </aside>
    <main>
      <section class="panel header">
        <h1 class="title">macaronV2 Threat Console</h1>
        <div class="subtitle">SQLite indexed scans, per-target storage, stage-aware pipeline, and geo heat map.</div>
      </section>
      <section class="panel right" id="detail">
        <div class="subtitle">Select a scan to inspect results.</div>
      </section>
    </main>
  </div>

  <script>
    let scans = [];
    let activeId = null;
    let map = null;
    let markers = [];

    function list(items, render, empty = 'No data') {
      if (!items || !items.length) return `<div class="footer">${empty}</div>`;
      return `<ul>${items.slice(0, 200).map(render).join('')}</ul>`;
    }

    function drawMap(points) {
      if (!map) {
        map = L.map('map', { worldCopyJump: true }).setView([20, 10], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
      }
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      (points || []).forEach(p => {
        const radius = Math.max(6, Math.min(22, p.count * 3));
        const marker = L.circleMarker([p.lat, p.lon], {
          radius,
          color: '#2df8b0',
          fillColor: '#2df8b0',
          fillOpacity: 0.3,
          weight: 2
        }).addTo(map);
        marker.bindPopup(`<b>${p.country || 'Unknown'}</b><br>${p.city || ''}<br>hits: ${p.count}`);
        markers.push(marker);
      });
    }

    async function loadHeat() {
      try {
        const res = await fetch('/api/heat');
        if (!res.ok) return;
        const points = await res.json();
        drawMap(points);
      } catch (_) {}
    }

    async function loadResult(id) {
      const res = await fetch('/api/results?id=' + encodeURIComponent(id));
      const r = await res.json();
      document.getElementById('detail').innerHTML = `
        <h2 style="margin:0">${r.target}</h2>
        <div class="footer">scan ${r.id} | mode ${r.mode} | duration ${r.duration_ms}ms</div>
        <div class="stats" style="margin-top:12px">
          <div class="stat"><div class="k">subdomains</div><div class="v">${r.stats.subdomains}</div></div>
          <div class="stat"><div class="k">live</div><div class="v">${r.stats.live_hosts}</div></div>
          <div class="stat"><div class="k">ports</div><div class="v">${r.stats.ports}</div></div>
          <div class="stat"><div class="k">urls</div><div class="v">${r.stats.urls}</div></div>
          <div class="stat"><div class="k">js</div><div class="v">${r.stats.js_files}</div></div>
          <div class="stat"><div class="k">vulns</div><div class="v">${r.stats.vulns}</div></div>
        </div>
        <div class="split">
          <div class="box">
            <h3>Global Heat Map</h3>
            <div id="map"></div>
          </div>
          <div class="box">
            <h3>Warnings</h3>
            ${list(r.warnings || [], x => `<li>${x}</li>`, 'No warnings')}
          </div>
          <div class="box">
            <h3>Live Hosts</h3>
            ${list(r.live_hosts, x => `<li>${x.status_code} <a href="${x.url}" target="_blank" style="color:#8dd3ff">${x.url}</a></li>`) }
          </div>
          <div class="box">
            <h3>Vulnerabilities</h3>
            ${list(r.vulns, x => `<li class="sev-${x.severity}">[${x.severity}] ${x.template} ${x.matched || ''}</li>`) }
          </div>
          <div class="box">
            <h3>URLs</h3>
            ${list(r.urls, x => `<li>${x}</li>`) }
          </div>
          <div class="box">
            <h3>JavaScript</h3>
            ${list(r.js_files, x => `<li>${x}</li>`) }
          </div>
        </div>
      `;
      loadHeat();
    }

    function renderScans(items) {
      const root = document.getElementById('scanList');
      root.innerHTML = '';
      items.forEach((s, idx) => {
        const node = document.createElement('div');
        node.className = 'scan' + (s.id === activeId ? ' active' : '');
        node.innerHTML = `<b>${s.target}</b><div class="m">${s.mode} | live ${s.stats.live_hosts} | urls ${s.stats.urls}</div><div class="m">${new Date(s.finished_at).toLocaleString()}</div>`;
        node.onclick = () => {
          activeId = s.id;
          document.querySelectorAll('.scan').forEach(el => el.classList.remove('active'));
          node.classList.add('active');
          loadResult(s.id);
        };
        root.appendChild(node);
        if (idx === 0 && !activeId) node.click();
      });
    }

    async function loadScans() {
      const res = await fetch('/api/scans');
      scans = await res.json();
      renderScans(scans);
    }

    document.getElementById('search').addEventListener('input', (e) => {
      const q = (e.target.value || '').toLowerCase().trim();
      if (!q) return renderScans(scans);
      renderScans(scans.filter(s => (s.target || '').toLowerCase().includes(q)));
    });

    loadScans();
  </script>
</body>
</html>
