name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Download modules
      run: go mod download

    - name: Run tests
      run: go test ./... -v

    - name: Build CLI
      run: mkdir -p bin && go build -o bin/macaron ./cmd/macaron

    - name: CLI smoke tests
      run: |
        ./bin/macaron --version
        ./bin/macaron

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Vet
      run: go vet ./...
